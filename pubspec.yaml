name: music_player
description: "Codenfast Music Player"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  path_provider: ^2.1.1
  file_picker: ^10.3.10
  permission_handler: ^11.1.0
  font_awesome_flutter: ^10.6.0
  animated_text_kit: ^4.3.0
  http: ^1.2.0
  path: ^1.9.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7  # covers both video AND audio per the docs

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Thin.ttf
          weight: 100
